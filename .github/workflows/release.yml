name: release

# Build and publish Linux amd64 + arm64 binaries on every `v*` tag push.
# Triggered by:  git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

# GoReleaser creates the GitHub Release and uploads artifacts, which needs
# write access to the repo contents.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for GoReleaser to build the changelog
          # by diffing against the previous tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # `latest` tracks the newest v2 release. Pin to a concrete version
          # (e.g. v2.11.0) if you want reproducible CI runs.
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
